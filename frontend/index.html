<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan-Guidance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f11;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 40px; }

        .card {
            background: #1a1a1f;
            border: 1px solid #2a2a33;
            border-radius: 12px;
            padding: 28px;
            width: 100%;
            max-width: 640px;
            margin-bottom: 20px;
        }

        .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #ccc; }

        /* Upload area */
        .drop-zone {
            border: 2px dashed #333;
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            color: #666;
            font-size: 0.9rem;
        }
        .drop-zone:hover, .drop-zone.over { border-color: #6366f1; color: #aaa; }
        .drop-zone input { display: none; }

        .btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 14px;
            display: inline-block;
        }
        .btn:hover { background: #5254cc; }
        .btn:disabled { background: #333; color: #666; cursor: default; }

        .file-name { margin-top: 10px; font-size: 0.85rem; color: #888; }

        /* Status */
        .status {
            font-size: 0.85rem;
            padding: 10px 14px;
            border-radius: 6px;
            margin-top: 14px;
            display: none;
        }
        .status.info  { background: #1e2a3a; color: #60a5fa; display: block; }
        .status.ok    { background: #0f2a1a; color: #4ade80; display: block; }
        .status.err   { background: #2a0f0f; color: #f87171; display: block; }

        /* Ask section */
        #ask-section { display: none; }

        .doc-badge {
            font-size: 0.8rem;
            background: #1e2040;
            color: #818cf8;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 16px;
        }

        textarea {
            width: 100%;
            background: #111116;
            border: 1px solid #2a2a33;
            border-radius: 8px;
            padding: 12px;
            color: #e8e8e8;
            font-size: 0.9rem;
            resize: vertical;
            min-height: 72px;
            font-family: inherit;
        }
        textarea:focus { outline: none; border-color: #6366f1; }

        /* Answer */
        #answer-box { display: none; margin-top: 18px; }

        .answer-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e8e8e8;
            padding: 16px;
            background: #111116;
            border-radius: 8px;
            border-left: 3px solid #6366f1;
            white-space: pre-wrap;
        }

        .quotes {
            margin-top: 12px;
        }
        .quote {
            font-size: 0.8rem;
            color: #666;
            padding: 6px 10px;
            border-left: 2px solid #2a2a33;
            margin-top: 6px;
            font-style: italic;
        }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>Titan-Guidance</h1>
    <p class="subtitle">Upload a document, then ask questions about it</p>

    <!-- Upload card -->
    <div class="card">
        <h2>1. Upload Document</h2>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept=".pdf">
            Drop a PDF here or click to choose
        </div>
        <div class="file-name" id="fileName"></div>
        <button class="btn" id="uploadBtn" disabled onclick="uploadFile()">Upload & Index</button>
        <div class="status" id="uploadStatus"></div>
    </div>

    <!-- Ask card -->
    <div class="card" id="ask-section">
        <h2>2. Ask a Question</h2>
        <div class="doc-badge" id="docBadge"></div>
        <textarea id="question" placeholder="e.g. What is the liability cap? When does the contract renew?"></textarea>
        <button class="btn" id="askBtn" onclick="ask()">Ask</button>
        <div id="answer-box">
            <div class="answer-text" id="answerText"></div>
            <div class="quotes" id="quotesBox"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000';
        let docId = null;
        let selectedFile = null;

        // Drag-and-drop
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('over');
            setFile(e.dataTransfer.files[0]);
        });

        document.getElementById('fileInput').addEventListener('change', e => setFile(e.target.files[0]));

        function setFile(f) {
            if (!f) return;
            selectedFile = f;
            document.getElementById('fileName').textContent = `${f.name} (${(f.size/1024/1024).toFixed(2)} MB)`;
            document.getElementById('uploadBtn').disabled = false;
        }

        function setStatus(id, type, html) {
            const el = document.getElementById(id);
            el.className = `status ${type}`;
            el.innerHTML = html;
        }

        async function uploadFile() {
            if (!selectedFile) return;
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            setStatus('uploadStatus', 'info', '<span class="spinner"></span>Uploading…');

            try {
                const fd = new FormData();
                fd.append('file', selectedFile);
                const r = await fetch(`${API}/ingest`, { method: 'POST', body: fd });
                if (!r.ok) throw new Error((await r.json()).detail || 'Upload failed');
                const data = await r.json();
                docId = data.doc_id;
                setStatus('uploadStatus', 'info', `<span class="spinner"></span>Indexing… this can take a few minutes for large PDFs. Doc ID: <strong>${docId}</strong>`);
                pollReady();
            } catch (e) {
                setStatus('uploadStatus', 'err', `Error: ${e.message}`);
                btn.disabled = false;
            }
        }

        async function pollReady() {
            // Poll until the /ask endpoint can return a result (embeddings ready)
            const probe = 'test';
            const maxWait = 5 * 60 * 1000; // 5 min
            const interval = 5000;
            const start = Date.now();

            while (Date.now() - start < maxWait) {
                await new Promise(r => setTimeout(r, interval));
                try {
                    const r = await fetch(`${API}/ask`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ doc_id: docId, question: probe })
                    });
                    // Any non-500 means the pipeline finished
                    if (r.status !== 500) {
                        onReady();
                        return;
                    }
                } catch (_) {}
                const elapsed = Math.round((Date.now() - start) / 1000);
                setStatus('uploadStatus', 'info', `<span class="spinner"></span>Indexing… ${elapsed}s elapsed. Doc ID: <strong>${docId}</strong>`);
            }
            setStatus('uploadStatus', 'err', `Indexing timed out. Try asking anyway — it may still work.`);
            onReady();
        }

        function onReady() {
            setStatus('uploadStatus', 'ok', `Ready. Doc ID: <strong>${docId}</strong>`);
            document.getElementById('docBadge').textContent = `Doc: ${docId}`;
            document.getElementById('ask-section').style.display = 'block';
            document.getElementById('ask-section').scrollIntoView({ behavior: 'smooth' });
        }

        async function ask() {
            const q = document.getElementById('question').value.trim();
            if (!q || !docId) return;
            const btn = document.getElementById('askBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Thinking…';

            const box = document.getElementById('answer-box');
            box.style.display = 'none';

            try {
                const r = await fetch(`${API}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ doc_id: docId, question: q })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.detail || 'Request failed');

                document.getElementById('answerText').textContent = data.answer;
                const qb = document.getElementById('quotesBox');
                qb.innerHTML = (data.quotes || [])
                    .filter(Boolean)
                    .map(qt => `<div class="quote">"${qt}"</div>`)
                    .join('');
                box.style.display = 'block';
            } catch (e) {
                document.getElementById('answerText').textContent = `Error: ${e.message}`;
                document.getElementById('quotesBox').innerHTML = '';
                box.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Ask';
            }
        }

        // Submit on Enter (Shift+Enter for newline)
        document.getElementById('question').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
        });
    </script>
</body>
</html>
